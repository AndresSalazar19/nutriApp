[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["B008", "E501", "E711", "E712"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=app.core.response --cov=app.schemas.response --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
omit = ["app/db/*"]
