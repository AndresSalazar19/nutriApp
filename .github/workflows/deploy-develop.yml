name: Deploy to VPS on push to develop

on:
  push:
    branches:
      - develop

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Deploy Backend
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (FastAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            echo "──────────────────────────────────────"
            echo "  NutriApp · Backend Deploy"
            echo "──────────────────────────────────────"

            PROJECT_DIR="/home/nutria/front/nutriApp"
            BACKEND_DIR="$PROJECT_DIR/backend"
            VENV_PATH="$PROJECT_DIR/venv"
            SERVICE_NAME="nutriapp.service"

            cd $PROJECT_DIR

            echo "[1/4] Trayendo cambios de develop..."
            git fetch origin develop
            git checkout develop
            git pull origin develop

            echo "[2/4] Actualizando dependencias Python..."
            source $VENV_PATH/bin/activate
            pip install -r $BACKEND_DIR/requirements.txt --quiet

            echo "[3/4] Reiniciando servicio..."
            sudo systemctl daemon-reload
            sudo systemctl restart $SERVICE_NAME

            echo "[4/4] Verificando estado..."
            sleep 3
            STATUS=$(systemctl is-active $SERVICE_NAME)
            if [ "$STATUS" = "active" ]; then
              echo "✅ Backend corriendo en puerto 8083"
            else
              echo "❌ Error: el servicio no arrancó"
              sudo systemctl status $SERVICE_NAME --no-pager
              exit 1
            fi

  # ─────────────────────────────────────────────
  # JOB 2: Deploy Frontend
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (React)
    runs-on: ubuntu-latest
    # Se ejecuta en paralelo con el backend
    needs: []

    steps:
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            echo "──────────────────────────────────────"
            echo "  NutriApp · Frontend Deploy"
            echo "──────────────────────────────────────"

            PROJECT_DIR="/home/nutria/front/nutriApp"
            FRONTEND_DIR="$PROJECT_DIR/frontend"

            cd $PROJECT_DIR

            echo "[1/4] Trayendo cambios de develop..."
            git fetch origin develop
            git checkout develop
            git pull origin develop

            echo "[2/4] Instalando dependencias npm..."
            cd $FRONTEND_DIR
            npm install --legacy-peer-deps --silent

            echo "[3/4] Construyendo aplicación..."
            npm run build

            echo "[4/4] Ajustando permisos para Nginx..."
            sudo chmod -R 755 $FRONTEND_DIR/build

            echo "✅ Frontend disponible en http://${{ secrets.VPS_HOST }}:82"

  # ─────────────────────────────────────────────
  # JOB 3: Notificación final
  # ─────────────────────────────────────────────
  notify:
    name: Resumen del deploy
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Estado del deploy
        run: |
          echo "Backend:  ${{ needs.deploy-backend.result }}"
          echo "Frontend: ${{ needs.deploy-frontend.result }}"

          if [[ "${{ needs.deploy-backend.result }}" == "success" && \
                "${{ needs.deploy-frontend.result }}" == "success" ]]; then
            echo "Deploy completo en develop"
          else
            echo "Uno o más deploys fallaron"
            exit 1
          fi
