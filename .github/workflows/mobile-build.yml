name: Mobile Android build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: mobile-android-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    name: Trigger Android ${{ inputs.profile }} build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_OWNER: ${{ vars.EAS_OWNER }}
      EAS_PROJECT_ID: ${{ vars.EAS_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Validate EAS configuration
        shell: bash
        run: |
          test -n "$EXPO_TOKEN" || { echo "Missing EXPO_TOKEN secret"; exit 1; }
          test -n "$EAS_OWNER" || { echo "Missing EAS_OWNER repository variable"; exit 1; }
          test -n "$EAS_PROJECT_ID" || { echo "Missing EAS_PROJECT_ID repository variable"; exit 1; }

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Validate mobile project
        run: npm run validate

      - name: Trigger EAS build
        run: eas build --platform android --profile "${{ inputs.profile }}" --non-interactive --no-wait
